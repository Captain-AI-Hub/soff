name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: soff.dll
            plugin_path: build/windows/x64/release/soff.dll
          - os: ubuntu-latest
            artifact: soff.so
            plugin_path: build/linux/x86_64/release/soff.so
          - os: macos-latest
            artifact: soff.dylib
            plugin_path: build/macosx/arm64/release/soff.dylib
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Install SQLite (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-0

      - name: Install SQLite (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://www.sqlite.org/2024/sqlite-dll-win-x64-3470200.zip"
          Invoke-WebRequest -Uri $url -OutFile sqlite.zip
          Expand-Archive sqlite.zip -DestinationPath sqlite
          Copy-Item sqlite\sqlite3.dll -Destination C:\Windows\System32\

      - name: Configure
        run: xmake config --ida_plugin=y -y

      - name: Install dependencies
        run: xmake require -y

      - name: Build
        run: xmake build -y

      - name: Test
        run: xmake run soff_smoke

      - name: Upload plugin
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.plugin_path }}
